services:
  postgres:
    image: postgres:16-alpine
    env_file:
      .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taskflow

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taskflow

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    env_file:
      .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taskflow

  task-service:
    build: ./task-service
    ports:
      - "3002:3002"
    env_file:
      .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - taskflow

  notification-service:
    build: ./notification-service
    ports:
      - "3003:3003"
    env_file:
      .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - taskflow

  api-gateway:
    build: ./api-gateway
    ports:
      - "4000:3000"
    env_file:
      .env
    depends_on:
      - user-service
      - task-service
      - notification-service
    networks:
      - taskflow

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - taskflow

volumes:
  postgres_data:

networks:
  taskflow:
    name: taskflow
    driver: bridge

services:
  # OpenTelemetry Collector - receives traces and metrics from services
  otel-collector:
    image: otel/opentelemetry-collector:0.114.0
    container_name: otel-collector
    ports:
      # gRPC receiver (port 4317) - for service-to-service communication
      - "4317:4317"
      # HTTP receiver (port 4318) - for traces/metrics via HTTP
      - "4318:4318"
      # Metrics endpoint (port 8888) - for Prometheus scraping collector's internal metrics
      - "8888:8888"
      # Metrics endpoint (port 8889) - for Prometheus scraping collector's internal metrics
      - "8889:8889"
    volumes:
      # Mount the OTel Collector configuration
      - ./infra/otel/config.yml:/etc/otel-collector-config.yml
    environment:
      - OTEL_CONFIG_PATH=/etc/otel-collector-config.yml
    command: ["--config=/etc/otel-collector-config.yml"]
    networks:
      - taskflow
    depends_on: []

  # Tempo - distributed tracing backend
  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    ports:
      # API/UI port (port 3200) - for Grafana to query traces
      - "3200:3200"
    volumes:
      # Mount the Tempo configuration
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml
      # # Persistent storage for traces
      # - tempo-storage:/tmp/tempo
      # - 
    environment:
      - TEMPO_CONFIG_PATH=/etc/tempo/tempo.yml
    command: ["-config.file=/etc/tempo/tempo.yml"]
    networks:
      - taskflow
    depends_on:
      - otel-collector

  # Prometheus - metrics database
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    ports:
      # Web UI and API (port 9090)
      - "9090:9090"
    volumes:
      # Mount the Prometheus configuration
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # Persistent storage for metrics
      - prometheus-storage:/prometheus
    environment:
      - PROMETHEUS_CONFIG_PATH=/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - taskflow
    depends_on:
      - otel-collector

  # Grafana - visualization platform
  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    ports:
      # Web UI (port 3000)
      - "3000:3000"
    volumes:
      # Provision datasources automatically
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      # Provision dashboards automatically
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      # Load exported dashboard JSON files
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      # Persistent storage for Grafana preferences, users, etc.
      - grafana-storage:/var/lib/grafana
    environment:
      # Admin credentials
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Disable public signup (only admin can create users)
      - GF_USERS_ALLOW_SIGN_UP=false
      # Log level
      - GF_LOG_LEVEL=info
    networks:
      - taskflow
    depends_on:
      - prometheus
      - tempo
      - loki

  # Loki - log aggregation backend
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yml
      - loki-storage:/loki
    command: ["-config.file=/etc/loki/local-config.yml"]
    networks:
      - taskflow

  # Promtail - Docker log collector
  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    networks:
      - taskflow
    depends_on:
      - loki

volumes:
  tempo-storage:
    driver: local
  prometheus-storage:
    driver: local
  grafana-storage:
    driver: local
  loki-storage:
    driver: local

networks:
  taskflow:
    name: taskflow
    driver: bridge

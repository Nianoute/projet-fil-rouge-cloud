server:
  # HTTP server for Grafana and API access (port 3200)
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    # gRPC receiver for traces from OTel Collector on port 4317 (performant)
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  # Ingester configuration for processing traces
  max_block_duration: 5m

storage:
  trace:
    backend: local
    wal:
      # Write-Ahead Log configuration
      # Ensures traces are not lost in case of crash
      # enabled: true
      path: /tmp/tempo/wal
    local:
      # Local disk storage for traces
      path: /tmp/tempo/traces
    # cache: memcached
    # memcached:
    #   batch_size: 1024
    #   parallelism: 100

querier:
  # Query frontend for serving requests
  max_concurrent_queries: 20

# limits:
#   # Global trace ingestion limit
#   max_traces_per_user: 10000
#   max_bytes_per_trace: 5000000
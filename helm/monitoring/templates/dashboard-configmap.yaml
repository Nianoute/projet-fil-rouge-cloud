apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  taskflow.json: |
    {
      "title": "TaskFlow — Services",
      "panels": [
        {
          "type": "graph",
          "title": "Requêtes par service",
          "targets": [
            {
              "expr": "rate(http_requests_total[5m])",
              "legendFormat": "{{ job }}"
            }
          ]
        }
      ]
    }